<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify versi buatan gw</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Music Navigation Bar -->
        <div class="container-music-navbar">
            <div class="media-player-controller">
                <button onclick="shuffleBtn()" id="shuffle" class="shuffle-style">
                    <img src="Media player sprite/Shuffle.png" class="music-controller">
                </button>
                <button onclick="prevBtn()" id="prev" class="prev-style"> 
                    <img src="Media player sprite/Previous.png" class="music-controller">
                </button>
                <button onclick="playBtn()" id="play" class="play-style">
                    <img src="Media player sprite/Play.png" id="playIcon" class="music-controller">
                </button>
                <button onclick="nextBtn()" id="next" class="next-style">
                    <img src="Media player sprite/Next.png" class="music-controller">
                </button>
                <button onclick="repeatBtn()" id="repeat" class="repeat-style">
                    <img src="Media player sprite/Repeat.png" class="music-controller">
                </button>
                <div class="container-song-title-display" id="container-song-title-display">
                    <div class="song-image-title">
                        <img src="Image/Music_logo.png" class="image-title">
                    </div>
                    <div class="current-song-name">
                        <h1 class="song-name-text" id="song-name-text">Song name</h1>
                        <h2 class="artist-name-text" id="artist-name-text">Artist name</h2>
                    </div>
                </div>
            </div>
        </div>
        <!-- Song slider progress -->
        <div class="container-song-slider">
            <input 
                type="range" 
                id="songProgress" 
                class="song-progress"
                value="0" 
                min="0" 
                step="0.01"
            >
        </div>
        <!-- Song list -->
        <div class="song-display-list">
            <!-- Import song -->
            <input type="file" id="fileInput" accept="audio/*" hidden>
            <label for="fileInput" class="song-import-field" id="dropArea">
                Import song
            </label>
            <!-- Playlist display -->
            <div class="playlist" id="playlist">
                <audio id="player"></audio>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>
    <script src="script.js" type="text/javascript" defer></script>
</body>
</html>
