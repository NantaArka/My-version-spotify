<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify versi buatan gw</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Music Navigation Bar -->
        <div class="container-music-navbar">
            <div class="media-player-controller">
                <button onclick="shuffleBtn" style="background: none; border: none; cursor: pointer;">
                    <img src="Media player sprite/Shuffle.png" class="music-controller">
                </button>
                <button onclick="PreBtn" style="background: none; border: none;"> 
                    <img src="Media player sprite/Previous.png" class="music-controller">
                </button>
                <button onclick="pauseBtn" style="background: none; border: none;">
                    <img src="Media player sprite/Pause.png" class="music-controller">
                </button>
                <button onclick="playBtn" style="background: none; border: none;">
                    <img src="Media player sprite/Play.png" class="music-controller">
                </button>
                <button onclick="nextBtn" style="background: none; border: none;">
                    <img src="Media player sprite/Next.png" class="music-controller">
                </button>
                <button onclick="repeatBtn" style="background: none; border: none;">
                    <img src="Media player sprite/Repeat.png" class="music-controller">
                </button>
            </div>
        </div>
        <!-- Song list -->
        <div class="song-display-list">
            <!-- Import song -->
            <input type="file" id="fileInput" accept="audio/*" hidden>
            <label for="fileInput" class="song-import-field" id="dropArea">
                Import song
            </label>
            <!-- Playlist display -->
            <div class="playlist" id="playlist">
                
            </div>
        </div>
    </div>

    <script src="script.js" type="text/javascript"></script>
</body>
</html>
